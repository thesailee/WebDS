<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Dashboard - Vũng Tàu Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.10.1/styles/overlayscrollbars.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="dist/css/adminlte.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <style>
        .small-box {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

            .small-box .icon {
                font-size: 60px;
                position: absolute;
                top: 10px;
                right: 15px;
                opacity: 0.3;
            }

        .product-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
    <div class="app-wrapper">
        <!-- Header -->
        <nav class="app-header navbar navbar-expand bg-body">...</nav> <!-- Giữ nguyên header như cũ -->
        <!-- Sidebar -->
        <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
            <div class="sidebar-brand">
                <a href="index.html" class="brand-link">
                    <img src="dist/assets/img/AdminLTELogo.png" alt="Logo" class="brand-image opacity-75 shadow">
                    <span class="brand-text fw-light">Vũng Tàu Admin</span>
                </a>
            </div>
            <div class="sidebar-wrapper">
                <nav class="mt-2">
                    <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview" role="menu">
                        <li class="nav-item"><a href="index.html" class="nav-link active"><i class="nav-icon bi bi-house-fill"></i><p>Dashboard</p></a></li>
                        <li class="nav-item"><a href="products.html" class="nav-link"><i class="nav-icon bi bi-box-seam-fill"></i><p>Quản Lý Sản Phẩm</p></a></li>
                        <li class="nav-item"><a href="registrations.html" class="nav-link"><i class="nav-icon bi bi-people-fill"></i><p>Quản Lý Đăng Ký</p></a></li>
                    </ul>
                </nav>
            </div>
        </aside>
        <!-- Main Content -->
        <main class="app-main">
            <!-- Breadcrumb & Thống kê (giữ nguyên cấu trúc) -->
            ...
        </main>
        <footer class="app-footer">...</footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.10.1/browser/overlayscrollbars.browser.es6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
    <script src="dist/js/adminlte.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        $(function () {
            // OverlayScrollbars
            const sidebarWrapper = document.querySelector('.sidebar-wrapper');
            if (sidebarWrapper && typeof OverlayScrollbarsGlobal?.OverlayScrollbars !== 'undefined') {
                OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, { scrollbars: { theme: 'os-theme-light', autoHide: 'leave', clickScroll: true } });
            }

            function updateDashboard() {
                const products = JSON.parse(localStorage.getItem('products') || '[]');
                const registrations = JSON.parse(localStorage.getItem('registrations') || '[]');
                $('#statProducts').text(products.length);
                $('#statRegistrations').text(registrations.length);
                const today = new Date().toLocaleDateString('vi-VN');
                const todayReg = registrations.filter(r => r.date && r.date.includes(today));
                $('#statToday').text(todayReg.length);
                if (products.length > 0) {
                    const avg = products.reduce((sum, p) => sum + Number(p.price), 0) / products.length;
                    $('#statAvgPrice').text(Number(avg).toLocaleString('vi-VN') + ' ₫');
                } else {
                    $('#statAvgPrice').text('0 ₫');
                }

                // Cập nhật bảng sản phẩm gần đây (Dynamic, không cần DataTable để dễ reload)
                const tbody = $('#recentProductTable tbody');
                tbody.empty();
                if (products.length > 0) {
                    $('#noProductMsg').addClass('d-none'); $('#recentProductTable').show();
                    const recent = products.slice(-5).reverse();
                    recent.forEach(function (p, i) {
                        let imgSrc = p.picture || '';
                        if (imgSrc && !imgSrc.startsWith('http')) imgSrc = '../' + imgSrc; // Admin cần ../ để xem ảnh
                        const imgTag = imgSrc ? `<img src="${imgSrc}" class="product-img" onerror="this.style.display='none'">` :
                            '<div class="bg-light d-inline-flex align-items-center justify-content-center" style="width:60px;height:60px;"><i class="bi bi-image"></i></div>';
                        tbody.append(`<tr><td>${i + 1}</td><td>${imgTag}</td><td><strong>${p.name}</strong></td><td><code>${p.id}</code></td><td class="text-danger">${Number(p.price).toLocaleString('vi-VN')} ₫</td></tr>`);
                    });
                } else {
                    $('#noProductMsg').removeClass('d-none'); $('#recentProductTable').hide();
                }
            }

            updateDashboard();
            setInterval(updateDashboard, 5000); // Cập nhật mỗi 5 giây thay vì reload
        });
    </script>
</body>
</html>
